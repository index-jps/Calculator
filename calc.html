<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="calc.css">
    <title>Calculator</title>
</head>
<body>
    <div id="Calculator">
      <div id="top">  <p>JaySarva's Calculator</p>
    <input type="text" id="display" disabled>
    </div>
        <div class="buttons">
            <button onclick="currentInput='';
            document.querySelector('#display').value=currentInput">C</button> 

            <button onclick="currentInput=currentInput+'1';
            document.querySelector('#display').value=currentInput">1</button>

            <button onclick="currentInput=currentInput+'2';
            document.querySelector('#display').value=currentInput">2</button>

            <button onclick="currentInput=currentInput+'3';
            document.querySelector('#display').value=currentInput">3</button>

            <button onclick="currentInput=currentInput+'+';
            document.querySelector('#display').value=currentInput">+</button>

            <button onclick="currentInput=currentInput+'4';
            document.querySelector('#display').value=currentInput">4</button>

            <button onclick="currentInput=currentInput+'5';
            document.querySelector('#display').value=currentInput">5</button>
            
            <button onclick="currentInput=currentInput+'6';
            document.querySelector('#display').value=currentInput">6</button>

            <button onclick="currentInput=currentInput+'-';
            document.querySelector('#display').value=currentInput">-</button>

            <button onclick="currentInput=currentInput+'7';
            document.querySelector('#display').value=currentInput">7</button>

            <button onclick="currentInput=currentInput+'8';
            document.querySelector('#display').value=currentInput">8</button>

            <button onclick="currentInput=currentInput+'9';
            document.querySelector('#display').value=currentInput">9</button>

            <button onclick="currentInput=currentInput+'*';
            document.querySelector('#display').value=currentInput">*</button>

            <button onclick="currentInput=currentInput+'/';
            document.querySelector('#display').value=currentInput">/</button>

            <button onclick="currentInput=currentInput+'0';
            document.querySelector('#display').value=currentInput">0</button>

            <button onclick="currentInput=currentInput+'.';
            document.querySelector('#display').value=currentInput">.</button>

            <button onclick="let result = eval(currentInput);
            document.querySelector('#display').value = result">=</button>
        </div>
    </div>
    <script>
        let currentInput = ' ';
        document.querySelector('#display').value = currentInput;
    </script>
</body>
</html>
